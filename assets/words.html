<!DOCTYPE html>
<html>

<head>
    <style>
        @font-face {
            font-family: "emoji";
            src: url("NotoColorEmoji.ttf");
        }

        .emoji {
            font-family: "emoji";
        }

        body {
            margin: 0;
            padding: 0;
        }

        #image {
            position: absolute;
            top: 16%;
            width: 100%;
            height: 50%;
            margin: 0;
            padding: 0;
            font-family: "emoji";
            font-size: 16vh;
            text-align: center;
        }

        #input {
            position: absolute;
            top: 50%;
            width: 50%;
            left: 25%;
            font-size: 8vh;
            text-align: center;
        }

        #list {
            position: absolute;
            top: 60%;
            width: 50%;
            left: 25%;
            font-family: sans-serif;
            font-size: 2vh;
            text-align: center;
        }
    </style>
    <script src="words.js" charset="UTF-8"></script>
</head>

<body>
    <div id="image"></div>
    <input id="input" type="text" oninput="display_image(this.value)" autofocus="true">
    <div id="list"></div>

    <script>
        const MAX_LIST_SIZE = 16;

        const highlight = (text, start, len) => {
            return `${text.slice(0, start)}<b>${text.slice(start, start + len)}</b>${text.slice(start + len, text.length)}`
        };

        const display_image = (query_) => {
            const query = query_.trim().toLowerCase();

            let images = "";
            let matches = [];
            if (query.length !== 0) {
                for (const [image, words] of Object.entries(WORDS)) {
                    for (const word_ of words) {
                        const word = word_.toLowerCase();
                        if (query == word) {
                            images += image;
                        }
                        const index = word.indexOf(query);
                        if (index !== -1) {
                            matches.push([index, word.length, image, word]);
                        }
                    }
                }
            }
            document.getElementById("image").innerText = images;

            matches.sort((a, b) => a[0] != b[0] ? a[0] - b[0] : a[1] - b[1]);
            matches = matches.slice(0, Math.min(MAX_LIST_SIZE, matches.length))
            matches = matches.map((a) => `<div><span class="emoji">${a[2]}</span>&nbsp;${highlight(a[3], a[0], query.length)}<div>`);
            document.getElementById("list").innerHTML = matches.join("");
        };
    </script>
</body>

</html>
